<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Proof Bar — Optimized Solutions (Component)</title>
  <!-- INSERT AFTER: hero section (<section> with "Transformation Over Transition") -->
  <!-- INSERT BEFORE: founder strip or certifications section -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', Arial, sans-serif; }

    /* ─── Social Proof Bar ─────────────────────────────── */
    .sp-bar {
      background: #F0EDE8;
      border-top: 1px solid #C8C4BC;
      border-bottom: 1px solid #C8C4BC;
      padding: 18px 28px;
    }

    .sp-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: wrap;
    }

    /* Trusted by block */
    .sp-trusted {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex: 1;
    }

    .sp-trusted-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #5A7880;
      white-space: nowrap;
    }

    .sp-logos {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* EDIT: Replace text with actual logo <img> elements when available */
    .sp-logo {
      font-size: 11px;
      font-weight: 700;
      color: #3D5A60;
      border: 1px solid #C8C4BC;
      background: #FAFAF8;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .sp-divider {
      width: 1px;
      height: 32px;
      background: #C8C4BC;
      flex-shrink: 0;
      margin: 0 28px;
    }

    .sp-stat {
      text-align: center;
      white-space: nowrap;
    }

    .sp-stat-number {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-weight: 700;
      color: #111C20;
      line-height: 1;
    }

    .sp-stat-label {
      font-size: 11px;
      color: #5A7880;
      margin-top: 3px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .sp-quote {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sp-stars {
      color: #C9973A;
      font-size: 12px;
      letter-spacing: 2px;
    }

    /* EDIT: Update pull quote text */
    .sp-quote-text {
      font-size: 13px;
      color: #3D5A60;
      font-style: italic;
      font-weight: 500;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .sp-inner    { flex-direction: column; align-items: flex-start; gap: 14px; padding: 6px 0; }
      .sp-divider  { display: none; }
      .sp-stat     { text-align: left; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     SOCIAL PROOF BAR
     Paste this <div> immediately after the closing </section>
     of the hero and before the founder strip / certifications.
     ════════════════════════════════════════════════════════ -->

<div class="sp-bar">
  <div class="sp-inner">

    <!-- EDIT: Replace .sp-logo spans with real client logos once available -->
    <div class="sp-trusted">
      <span class="sp-trusted-label">Trusted by enterprise teams across</span>
      <div class="sp-logos">
        <span class="sp-logo">Banking</span>
        <span class="sp-logo">Healthcare</span>
        <span class="sp-logo">Technology</span>
        <span class="sp-logo">Government</span>
        <span class="sp-logo">Retail</span>
      </div>
    </div>

    <div class="sp-divider"></div>

    <!-- EDIT: Update number if count changes -->
    <div class="sp-stat">
      <div class="sp-stat-number">200+</div>
      <div class="sp-stat-label">Professionals certified</div>
    </div>

    <div class="sp-divider"></div>

    <!-- EDIT: Update years if needed -->
    <div class="sp-stat">
      <div class="sp-stat-number">15+</div>
      <div class="sp-stat-label">Years enterprise SAFe experience</div>
    </div>

    <div class="sp-divider"></div>

    <!-- EDIT: Update pull quote -->
    <div class="sp-quote">
      <div class="sp-stars">★★★★★</div>
      <div class="sp-quote-text">"Transformation that actually sticks"</div>
    </div>

  </div>
</div>

</body>
</html>
